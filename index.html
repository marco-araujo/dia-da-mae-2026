<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffdde1;
            overflow: hidden;
        }

        /* Tela inicial */
        #startScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }

        #startScreen h1 {
            font-size: 40px;
            color: #4a0033;
            margin-bottom: 20px;
            animation: fadeIn 2s ease;
        }

        #startBtn {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #b30059;
            color: white;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

            padding: 20px;
            color: #4a0033;
